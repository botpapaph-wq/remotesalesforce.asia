<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>About Me</title>

  <style>
    /* Reset / Basis */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #020617;
      color: #e5e7eb;
    }

    /* Banner oben mit eingepasstem Bild */
    .about-banner {
      width: 100%;
      height: 260px; /* nur diese Höhe ändern, wenn du mehr/weniger Platz willst */

      background-image: url("pics/ChatGPT Image May 4, 2026, 03_02_24 PM.png");
      background-repeat: no-repeat;
      background-position: center center;  /* Bild zentriert [web:129] */
      background-size: contain;            /* Bild komplett sichtbar einpassen [web:161][web:219] */
      background-color: #020617;

      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      padding: 24px;
    }

    /* Text im Banner (optional) */
    .about-banner-overlay {
      background: rgba(0, 0, 0, 0.5);
      padding: 8px 16px;
      border-radius: 6px;
    }

    .about-banner-overlay h1 {
      font-size: 24px;
      color: #f9fafb;
    }

    .about-banner-overlay p {
      font-size: 14px;
      color: #d1d5db;
    }

    /* Hauptbereich unter dem Banner */
    .about-main {
      max-width: 960px;
      margin: 32px auto;
      padding: 0 16px;
    }

    /* Profilbild + Text nebeneinander */
    .about-content {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    /* Profilbild links */
    .about-avatar img {
      width: 140px;
      height: 140px;
      border-radius: 999px;
      object-fit: cover;  /* Standard für Avatare [web:167] */
      border: 3px solid #111827;
    }

    /* Text rechts */
    .about-text h2 {
      font-size: 20px;
      margin-bottom: 12px;
    }

    .about-text p {
      margin-bottom: 8px;
      line-height: 1.4;
    }

    /* Mobile: untereinander */
    @media (max-width: 700px) {
      .about-content {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .about-avatar img {
        margin-bottom: 16px;
      }

      .about-main {
        margin-top: 20px;
      }
    }
  </style>
</head>
<body>

  <!-- Banner mit eingepasstem Bild -->
  <header class="about-banner">
    <div class="about-banner-overlay">
      <h1>Dein Name</h1>
      <p>Dein Claim / Untertitel</p>
    </div>
  </header>

  <!-- Hauptbereich -->
  <main class="about-main">
    <section class="about-content">
      <div class="about-avatar">
        <img src="pics/passbild.png" alt="Profilbild">
      </div>
      <div class="about-text">
        <h2>Über mich</h2>
        <p>Hier steht dein Text über dich.</p>
        <p>Skills, Job, was du willst.</p>
      </div>
    </section>
  </main>

</body>
</html>
